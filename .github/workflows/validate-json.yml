name: Validate Daily Content and Sync Main

on:
  push:
    branches:
      - develop
    paths:
      - "dailycontent/*.json"
      - "dailycontent/**/*.json"
      - ".github/workflows/validate-json.yml"
  pull_request:
    branches:
      - main
    paths:
      - "dailycontent/*.json"
      - "dailycontent/**/*.json"
      - ".github/workflows/validate-json.yml"

jobs:
  validate-json:
    name: Validate dailycontent JSON files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Parse JSON files
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const targetDirectory = path.join(process.cwd(), "dailycontent");

          function listJsonFiles(directory) {
            const files = [];

            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const entryPath = path.join(directory, entry.name);
              if (entry.isDirectory()) {
                files.push(...listJsonFiles(entryPath));
              } else if (entry.isFile() && entry.name.endsWith(".json")) {
                files.push(entryPath);
              }
            }

            return files;
          }

          const jsonFiles = listJsonFiles(targetDirectory).sort();
          const failures = [];

          for (const file of jsonFiles) {
            try {
              JSON.parse(fs.readFileSync(file, "utf8"));
            } catch (error) {
              const relativePath = path.relative(process.cwd(), file);
              failures.push({ file: relativePath, message: error.message });
              console.error(`::error file=${relativePath}::Invalid JSON: ${error.message}`);
            }
          }

          if (failures.length > 0) {
            console.error(`\nInvalid JSON files: ${failures.length}`);
            for (const failure of failures) {
              console.error(`- ${failure.file}: ${failure.message}`);
            }
            process.exit(1);
          }

          console.log(`Validated ${jsonFiles.length} JSON files.`);
          NODE

  merge-to-main:
    name: Merge develop into main
    runs-on: ubuntu-latest
    needs: validate-json
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge develop into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --ff-only origin/develop
          git push origin main
